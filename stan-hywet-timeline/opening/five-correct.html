<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="style.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Question 5 - Correct</title>
    <style>
      .correct-answer {
        background-color: #ccffcc;
        border: 3px solid #00cc00;
        padding: 20px;
        border-radius: 8px;
        margin: 20px;
      }
      .answer-label {
        color: #00cc00;
        font-weight: bold;
        font-size: 1.2em;
        margin-bottom: 10px;
      }
      .redirect-notice {
        color: #00cc00;
        font-size: 0.9em;
        margin-top: 15px;
        text-align: center;
      }
      h2 {
        font-size: clamp(1.2rem, 4vw, 1.8rem);
      }
    </style>
  </head>
  <body class="flex">
    <div class="menubar">
      <a href="four.html">
        <button>
          <span class="button_top">Back</span>
        </button>
      </a>
    </div>
    <div class="correct-answer">
      <p class="answer-label">✓ Correct!</p>
      <h2>
        This is considered a luxury in homes even today. A vacuum cleaner would
        be connected to a hose in the wall, and all the dust would be collected
        in one big room.
      </h2>
      <img
        src="central-vacuum-system.png"
       
      />
      <p class="redirect-notice">
        Continuing to next question in <span id="timer">5</span> seconds...
      </p>
    </div>
    <script>
      let countdown = 5;
      const timerElement = document.getElementById("timer");

      const interval = setInterval(() => {
        countdown--;
        timerElement.textContent = countdown;

        if (countdown <= 0) {
          clearInterval(interval);
          window.location.href = "six.html";
        }
      }, 1000);
    </script>
  </body>
</html>
